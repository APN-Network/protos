syntax = "proto3";
package proto;

enum Status {
  OK = 0;
  ERROR = 1;
}

message Welcome {
  Status status = 1;
  string major = 5;
  uint32 minor = 6;
  bytes ip = 2;
  string error = 3;
  bytes padding = 4;
  bytes home = 7;
}

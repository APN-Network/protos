syntax = "proto3";
package proto;

// Lease describes the client's paid subscription as known to the
// Hub. An empty Lease (ends == 0) means the client is on the free
// tier and is bound by the rolling free-quota window enforced via
// Pong.cutoff and Pong.cooldown.
message Lease {
  // Unix timestamp (seconds) at which the paid plan stops covering
  // the client. While `ends > now` the client is unmetered and the
  // Node ignores the free-quota check; once `ends <= now` the
  // client is treated as free-tier.
  uint64 ends = 1;
}

// Property is one purchased "country slot": a country the client is
// entitled to route through. The slot is attached to a particular
// Node for the duration of that Node's life and re-attached when
// the Node is rotated out.
message Property {
  // Unix timestamp (seconds) at which the slot itself expires —
  // i.e. when the customer's purchase runs out. Independent of the
  // life of the underlying Node (see `expires`).
  uint64 ends = 1;

  // ISO 3166-1 alpha-2 country code of the slot ("US", "DE", …).
  string country = 2;

  reserved 3;

  // Public IPv4 of the Node currently backing this slot, in dotted
  // form ("203.0.113.7"). Empty / "0.0.0.0" while the slot is
  // detached.
  string ip = 4;

  // TCP port to dial on the backing Node. Always 443 in production
  // but kept explicit so a Node may move to a different port
  // without a client release. Valid range 1–65535; the Hub and Node
  // MUST reject values outside this range.
  uint32 port = 5;

  // Unix timestamp (seconds) of the most recent telemetry record
  // received by the Hub from the backing Node — i.e. "last seen
  // alive". Zero means the Node has never reported. Clients warn
  // if the gap to wall-clock time grows beyond a few minutes.
  uint64 metered = 6;

  // Unix timestamp (seconds) at which the backing Node will be
  // decommissioned. Distinct from `ends`: the slot can outlive the
  // Node, in which case the Hub re-attaches it to a fresh Node and
  // the client receives an updated Property. When this Property is
  // backed by the connected Node, Pong.expires (field 14) is the
  // authoritative source and MUST be preferred over this value if
  // the two differ.
  uint64 expires = 7;

  // TLS Server Name Indication the backing Node presents on its
  // endpoint. The client must put this exact hostname in the
  // ClientHello SNI when dialing the slot's Node, so the handshake
  // blends in with ordinary HTTPS traffic. Same semantics as
  // Peer.sni; assigned by the Hub and stable for the life of the
  // backing Node. Empty while the slot is detached; clients MUST
  // NOT dial a slot with an empty sni.
  string sni = 8;
}

// Peer describes one sibling Node in the fleet, advertised to
// clients so they can rotate to a different exit when their current
// Node nears expiry.
message Peer {
  // Public IPv4 of the peer as four raw bytes (network byte order).
  bytes ip = 1;

  // TCP port on which the peer accepts client connections. Valid
  // range 1–65535; the Hub MUST reject values outside this range.
  uint32 port = 2;

  // ISO 3166-1 alpha-2 country code where the peer is hosted.
  string country = 3;

  // Unix timestamp (seconds) of the peer's most recent telemetry
  // report at the Hub — same semantics as Property.metered.
  uint64 metered = 4;

  // Unix timestamp (seconds) at which the peer is scheduled for
  // decommission.
  uint64 expires = 5;

  // TLS Server Name Indication the peer presents on its endpoint.
  // The client must put this exact hostname in the ClientHello SNI
  // when dialing the peer, so the handshake blends in with ordinary
  // HTTPS traffic to a popular domain ("github.com", "apple.com", …).
  // Assigned at random by the Hub when the Node is created and stable
  // for the life of that Node. MUST be non-empty; an empty sni would
  // cause a TLS handshake failure indistinguishable from a dead Node.
  // Clients MUST discard a Peer with an empty sni rather than dialling
  // it.
  string sni = 6;
}

// Pong is the Node's reply to a Ping. It both acknowledges the
// keep-alive and ferries fresh state from the Hub (lease,
// properties, fleet) so the client UI can stay current without a
// separate channel.
message Pong {
  // Echo of Ping.timestamp, used by the client to compute RTT.
  uint64 timestamp = 1;

  // Current lease snapshot for this client. Always present; an
  // empty Lease means free tier.
  Lease lease = 2;

  // Current set of country slots owned by this client.
  // Max 256 entries; clients MUST reject a Pong carrying more.
  repeated Property properties = 3;

  // Field numbers 4..12 were used by earlier protocol revisions
  // and must not be re-purposed.
  reserved 4 to 12;

  // Other Nodes in the fleet, advertised so that the client can
  // pick a fallback when the current Node is about to expire.
  // Max 256 entries; clients MUST reject a Pong carrying more.
  repeated Peer servers = 13;

  // Unix timestamp (seconds) at which *this* Node — the one
  // answering the Ping — will be decommissioned. The client uses
  // it to migrate to a peer before the Node disappears. This is
  // the authoritative source for the connected Node's retirement;
  // when a Property slot is backed by the same Node, the client
  // MUST prefer Pong.expires over Property.expires if the two
  // disagree.
  uint64 expires = 14;

  // Fixed Unix timestamp (seconds) at which the client's free-tier
  // service grant ends. Unlike earlier revisions this is a stable
  // moment computed from server-side state, not a value that drifts
  // between Pongs, so the client may cache it and reason about it
  // offline.
  //
  // Semantics by value:
  //
  //   cutoff == SENTINEL (UINT64_MAX)
  //       Hub state not yet loaded (transient, briefly after Auth
  //       while the Node is fetching the client record from the
  //       Hub). The client SHOULD act as if no free-tier information
  //       is available yet and await the next Pong.
  //
  //   cutoff <= now
  //       Free-tier client past the free window—cut off. Render
  //       "free in X" using `cooldown` (see below).
  //
  //   now < cutoff < SENTINEL
  //       Three sub-cases:
  //
  //       a) Paid client (lease.ends > now):
  //          cutoff == lease.ends. The free-tier line is irrelevant;
  //          the client renders "Paid until ..." from `lease`.
  //
  //       b) Free-tier client inside the free window:
  //          (cutoff - now) is the remaining time — render
  //          "free for X more".
  //
  //       c) Free-tier placeholder (should not happen in practice
  //          after the initial loading Pong, but client handles it
  //          the same as b).
  //
  // Protocol constant — clients MUST compare against the exact
  // sentinel value (UINT64_MAX / 0xFFFFFFFFFFFFFFFF) rather than
  // using a range check, so that a genuine paid-plan timestamp
  // (which may be years into the future) is never mistaken for the
  // loading placeholder.
  uint64 cutoff = 15;

  // Fixed Unix timestamp (seconds) at which the client may next use
  // the service for free — i.e. the moment the cooldown that
  // follows an exhausted free window ends (cutoff + 45 minutes for
  // free-tier clients). Like `cutoff` it is a stable moment that
  // does not drift between Pongs, so the client caches it and
  // renders a precise countdown:
  //
  //   * cutoff <= now < cooldown: the client is cooling down;
  //     (cooldown - now) is the wait before a fresh free window —
  //     render "free in X".
  //
  //   * now >= cooldown: the cooldown has elapsed; render "try to
  //     connect anyway".
  //
  // When cutoff == SENTINEL (UINT64_MAX) or the client is paid
  // (lease.ends > now), cooldown is also set to UINT64_MAX and
  // carries no meaning.
  uint64 cooldown = 17;

  // Free-form Node-side metrics surfaced to the client for
  // diagnostics and server-pick heuristics. Known keys:
  //   "SLA"      — Node 1-minute Unix load average × 100.
  //   "clients"  — current number of connected clients.
  //   "version"  — Node build number (matches Welcome.minor).
  //   "brothers" — size of the advertised peer set.
  //   "stalls"   — count of slow socket writes seen for this
  //                client since connect (back-pressure signal).
  //   "PPM"      — packets per minute, in and out across all
  //                tunnels over the trailing minute.
  //   "TUN"      — slow TUN writes per minute on the Node side of
  //                this client's tunnel (back-pressure signal, same
  //                shape as PPM).
  //   "MEM"      — resident memory of the Node process, in MB.
  // Unknown keys must be ignored by the client. Max 32 entries;
  // each key MUST NOT exceed 16 bytes. Clients MUST reject a Pong
  // carrying a gauges map that violates these bounds.
  map<string, int64> gauges = 16;

  // Optional diagnostic line the Node wants surfaced to the user.
  // Usually empty. When set, formatted as "X WWW": a single
  // severity letter X ("I" info, "W" warn, "D" debug), a space,
  // then the message text. The client splits off X and logs the
  // text at that level; an unknown or missing letter means info.
  string notice = 18;
}

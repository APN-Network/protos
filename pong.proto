syntax = "proto3";
package proto;

message Lease {
  uint64 ends = 1;
}

message Property {
  uint64 ends = 1;
  string country = 2;
  string ip = 4;
  uint32 port = 5;
  uint64 metered = 6;
  uint64 expires = 7;
}

message Peer {
  bytes ip = 1;
  uint32 port = 2;
  string country = 3;
  uint64 metered = 4;
  uint64 expires = 5;
}

message Pong {
  uint64 timestamp = 1;
  Lease lease = 2;
  repeated Property properties = 3;
  reserved 4 to 12;
  repeated Peer servers = 13;
  uint64 expires = 14;
  uint64 cutoff = 15;
  map<string, int64> gauges = 16;
}

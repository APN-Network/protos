syntax = "proto3";
package proto;

// Ping is sent by the client at a regular interval (a few seconds)
// to keep the tunnel alive, drive RTT measurement, and piggyback
// reachability reports about peer Nodes. The Node answers each Ping
// with a Pong.
message Ping {
  // Client clock at the moment the Ping was prepared, in
  // milliseconds since the Unix epoch. The Node echoes it back in
  // Pong.timestamp so that the client can compute round-trip time
  // without keeping per-request state.
  uint64 timestamp = 1;

  // Per-peer probe-failure counters accumulated since the previous
  // Ping. The key is the peer Node's IPv4 address in dotted form
  // ("203.0.113.7"); the value is the number of probes that failed
  // (timeouts, refusals, etc.). Forwarded to the Hub so that
  // unreachable Nodes can be retired. MUST NOT contain more entries
  // than the fleet size (dozens); the Node SHOULD discard or
  // truncate a Ping whose canaries map exceeds that bound to prevent
  // unbounded map allocation per session.
  map<string, uint32> canaries = 2;

  // Round-trip time of the previous Ping/Pong exchange, in
  // milliseconds, measured by the client. Zero means "no measurement
  // yet" (e.g. the first Ping of a session before any Pong has
  // arrived); the Node MUST ignore a zero and not record it. The Node
  // buckets non-zero values into a fixed histogram and reports the
  // per-client average RTT to the Hub with usage data.
  uint32 rtt = 3;
}

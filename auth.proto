syntax = "proto3";
package proto;

// Auth is sent by the client to the Node as the first application
// message after the TLS handshake. The Node verifies the HMAC tag
// against its current (and previous) pre-shared key and uses the
// recovered identity to set up the tunnel session.
message Auth {
  // Stable client identifier, exactly nine raw UTF-8 bytes; signed
  // by the HMAC together with timestamp_ms. Not a UUID — the Hub
  // generates it once per installation.
  bytes client_id = 1;

  // Milliseconds since the Unix epoch, used as a replay-prevention
  // nonce. The Node accepts the message only if this value is within
  // a small clock-skew window (typically 1–2 seconds) of its own
  // clock. Millisecond granularity ensures a unique nonce per Auth
  // message; unlike the previous minute-based timestamp, an attacker
  // cannot replay a captured frame at any point within a multi-minute
  // window.
  uint64 timestamp_ms = 2;

  // Truncated HMAC-SHA256 (12 bytes) over (client_id || timestamp_ms),
  // computed with the pre-shared key issued to this client. The
  // timestamp is serialised as 8 bytes in big-endian (network byte
  // order) before concatenation. Proves possession of the PSK
  // without revealing it. Receivers MUST assert len(hmac) == 12
  // and reject the Auth before performing any comparison; a shorter
  // or absent value weakens authentication non-deterministically
  // across implementations.
  bytes hmac = 3;

  // Free-form device label reported by the client (e.g. "SM-G998B",
  // "Pixel 8"). Recorded by the Hub for usage analytics; not used
  // for authentication.
  string device = 4;

  // Client locale tag (BCP-47, e.g. "en-US"), passed through to the
  // Hub for analytics and for localised server-side notifications.
  string locale = 5;

  // Random bytes appended so that the encrypted message size varies
  // across sessions. Defeats traffic-analysis fingerprinting of the
  // Auth frame; the Node ignores the contents.
  bytes padding = 6;

  // Version of the APN client software sending the request, in the
  // form "<store>:<semver>", where the store is a single letter
  // naming the marketplace the build was released to: "G" for Google
  // Play, "H" for Huawei AppGallery (e.g. "G:1.1.1" or "H:1.1.1").
  // Forwarded by the Node to the Hub for usage analytics; not used
  // for authentication.
  string version = 7;

  // Screen dimension of the client device in physical pixels, in the
  // form "<width>x<height>" (e.g. "1440x3120"). Forwarded by the Node
  // to the Hub for usage analytics; not used for authentication.
  string screen = 8;
}
